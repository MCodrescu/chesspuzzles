<html>

<head>
    <script src="node_modules/jquery/dist/jquery.min.js"></script>
    <script src="node_modules/@chrisoakman/chessboardjs/dist/chessboard-1.0.0.min.js"></script>
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="node_modules/@chrisoakman/chessboardjs/dist/chessboard-1.0.0.min.css" />
    <link href="node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>
    <div class="container text-center">
        <div class="row pb-3">
            <div class="col">
                <div class="h2">
                    Chess Puzzles
                </div>
            </div>

        </div>
    </div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-4">
                <form>
                    <div class="mb-3">
                        <label for="chessUsername" class="form-label">Username</label>
                        <input type="text" class="form-control" id="chessUsername" value="MCodrescu">
                    </div>
                    <div class="mb-3">
                        <label for="year" class="form-label">Year</label>
                        <input type="number" class="form-control" id="year" value="2026">
                    </div>
                    <div class="mb-3">
                        <label for="month" class="form-label">Month</label>
                        <input type="number" class="form-control" id="month" value="3">
                    </div>
                    <div class="mb-3">
                        <label for="gameFormat" class="form-label">Game Format</label>
                        <select class="form-select" id="gameFormat">
                            <option value="blitz">Blitz</option>
                            <option value="rapid">Rapid</option>
                            <option value="daily">Daily</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="gameNumber" class="form-label">Game Number</label>
                        <input type="number" class="form-control" id="gameNumber" value="10">
                    </div>
                    <input type="button" id="loadGames" class="btn btn-primary" value="New Puzzle">
                    <p class="pt-3" id="gameInfo"></p>
                </form>
            </div>
            <div class="col-8">
                <div id="board1" style="width: 60%"></div>
            </div>
        </div>
    </div>

    <!-- Toast for correct answer -->
    <button type="button" class="btn btn-primary" id="correctAnswerToastBtn" style = "display: none;"></button>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" data-bs-autohide = "false" aria-atomic="true">
            <div class="toast-header">
                <img src="..." class="rounded me-2" alt="...">
                <strong class="me-auto">Answer</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Correct!
            </div>
        </div>
    </div>

    <!-- Toast for incorrect answer -->
    <button type="button" class="btn btn-primary" id="incorrectAnswerToastBtn" style = "display: none;"></button>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToastWrong" class="toast" role="alert" data-bs-autohide = "false" aria-live="assertive" aria-atomic="true">
            <div class="toast-header">
                <img src="..." class="rounded me-2" alt="...">
                <strong class="me-auto">Answer</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id = "incorrectToastBody">
                Incorrect!
            </div>
            <div></div>
        </div>
    </div>
    <script src="js/chessboard.js"></script>
</body>

</html>
