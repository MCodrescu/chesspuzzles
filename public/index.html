<html>

<head>
    <!--JQuery-->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

    <!--Cm-chessboard.js and Chess.js-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="./node_modules/cm-chessboard/assets/chessboard.css"/>
    <link rel="stylesheet" href="./node_modules/cm-chessboard/assets/extensions/markers/markers.css"/>
    <link rel="stylesheet" href="./node_modules/cm-chessboard/assets/extensions/arrows/arrows.css"/>
    <link rel="stylesheet" href="./node_modules/cm-chessboard/assets/extensions/promotion-dialog/promotion-dialog.css"/>

    <!--Boostrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="bg-light bg-gradient">

    <!-- Offcanvas for game details -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasExample" aria-labelledby="offcanvasExampleLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasExampleLabel">Offcanvas</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <p class="fs-4 fw-bold">Game Details</p>
            <form>
                <div class="mb-3">
                    <label for="chessUsername" class="form-label">Username</label>
                    <input type="text" class="form-control" id="chessUsername" value="MCodrescu">
                </div>
                <div class="mb-3">
                    <label for="year" class="form-label">Year</label>
                    <input type="number" class="form-control" id="year" value="2026">
                </div>
                <div class="mb-3">
                    <label for="month" class="form-label">Month</label>
                    <input type="number" class="form-control" id="month" value="3">
                </div>
                <div class="mb-3">
                    <label for="gameFormat" class="form-label">Game Format</label>
                    <select class="form-select" id="gameFormat">
                        <option value="blitz">Blitz</option>
                        <option value="rapid">Rapid</option>
                        <option value="daily">Daily</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="gameNumber" class="form-label">Game Number</label>
                    <input type="number" class="form-control" id="gameNumber" value="10">
                </div>
                <input type="button" class="btn btn-primary w-100 mt-3" data-bs-toggle="offcanvas"
                    value="Submit">
                <p class="pt-3" id="gameInfo"></p>
            </form>
        </div>
    </div>

    <div class="container pt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8">
                <div class="container text-center">
                    <div class="row pb-3">
                        <div class="col">
                            <div class="h1 fw-bold">
                                Chess Puzzles
                            </div>
                            <button class="btn btn-primary" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#offcanvasExample" aria-controls="offcanvasExample">
                                Edit Game Details
                            </button>
                            <button class="btn btn-primary" type="button" id="loadGames">
                                New Puzzle
                            </button>
                        </div>
                    </div>
                    <div class="row justify-content-center">
                        <div class="col-12 col-md-8 bg-white rounded-5 p-3 p-md-4 shadow">
                            <!--div id="board1" style="width: 100%; display:none;"></div-->
                            <div class="board board-large" id="board"></div>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Toast for correct answer -->
    <button type="button" class="btn btn-primary" id="correctAnswerToastBtn" style="display: none;"></button>

    <!-- Toast for incorrect answer -->
    <button type="button" class="btn btn-p" id="incorrectAnswerToastBtn" style="display: none;"></button>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" data-bs-autohide="false"
            aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Answer</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Correct!
            </div>
        </div>

        <div id="liveToastWrong" class="toast" role="alert" data-bs-autohide="false" aria-live="assertive"
            aria-atomic="true">
            <div class="toast-header bg-warning">
                <strong class="me-auto">Answer</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="incorrectToastBody">
                Incorrect!
            </div>
            <div></div>
        </div>
    </div>



    <!--script src="js/chessboard.js"></script-->
    <script src="js/chessboard2.js" type="module"></script>

</body>

</html>
