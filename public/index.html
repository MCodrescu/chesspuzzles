<html>

<head>
    <!--JQuery-->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

    <!--Chessboard.js and Chess.js-->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css" />

    <!--Boostrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>

<body class="bg-light bg-gradient">
    <div class="container pt-5">
        <div class="row">
            <div class="col-3 bg-white rounded-5 p-4 shadow">
                <p class = "fs-4 fw-bold">Game Details</p>
                <form>
                    <div class="mb-3">
                        <label for="chessUsername" class="form-label">Username</label>
                        <input type="text" class="form-control" id="chessUsername" value="MCodrescu">
                    </div>
                    <div class="mb-3">
                        <label for="year" class="form-label">Year</label>
                        <input type="number" class="form-control" id="year" value="2026">
                    </div>
                    <div class="mb-3">
                        <label for="month" class="form-label">Month</label>
                        <input type="number" class="form-control" id="month" value="3">
                    </div>
                    <div class="mb-3">
                        <label for="gameFormat" class="form-label">Game Format</label>
                        <select class="form-select" id="gameFormat">
                            <option value="blitz">Blitz</option>
                            <option value="rapid">Rapid</option>
                            <option value="daily">Daily</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="gameNumber" class="form-label">Game Number</label>
                        <input type="number" class="form-control" id="gameNumber" value="10">
                    </div>
                    <input type="button" id="loadGames" class="btn btn-primary" value="New Puzzle">
                    <p class="pt-3" id="gameInfo"></p>
                </form>
            </div>
            <div class="col-9">
                <div class="container text-center">
                    <div class="row pb-3">
                        <div class="col">
                            <div class="h1 fw-bold">
                                Chess Puzzles
                            </div>
                        </div>
                    </div>
                    <div class="row justify-content-center">
                        <div class="col-8 bg-white rounded-5 p-4 shadow">
                            <div id="board1" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Toast for correct answer -->
    <button type="button" class="btn btn-primary" id="correctAnswerToastBtn" style="display: none;"></button>

    <!-- Toast for incorrect answer -->
    <button type="button" class="btn btn-p" id="incorrectAnswerToastBtn" style="display: none;"></button>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" data-bs-autohide="false"
            aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Answer</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Correct!
            </div>
        </div>

        <div id="liveToastWrong" class="toast" role="alert" data-bs-autohide="false" aria-live="assertive"
            aria-atomic="true">
            <div class="toast-header bg-warning">
                <strong class="me-auto">Answer</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="incorrectToastBody">
                Incorrect!
            </div>
            <div></div>
        </div>
    </div>



    <script src="js/chessboard.js"></script>
</body>

</html>
